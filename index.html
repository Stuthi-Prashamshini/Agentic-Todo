<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroTask - Premium Glassmorphic Todo App</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-decorations">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-main">
                <div class="logo-area">
                    <div class="app-icon"><i class="fa-solid fa-circle-check"></i></div>
                    <div>
                        <h1>AeroTask</h1>
                        <p class="tagline">Elevate your daily productivity</p>
                    </div>
                </div>
                <div class="header-right">
                    <div class="date-display" id="dateDisplay">Monday, June 15</div>
                    <button class="sound-toggle" id="soundToggle" title="Toggle Sound Feedback">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Stats Dashboard HUD -->
        <section class="dashboard-hud">
            <div class="hud-card progress-card">
                <div class="progress-ring-wrapper">
                    <svg class="progress-ring" width="80" height="80">
                        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.08)" stroke-width="6" fill="transparent" r="34" cx="40" cy="40"/>
                        <circle class="progress-ring__circle" id="progressRing" stroke="url(#gradient)" stroke-width="6" fill="transparent" r="34" cx="40" cy="40"/>
                        <defs>
                            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#8a2be2" />
                                <stop offset="100%" stop-color="#00f2fe" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="progress-text" id="progressText">0%</div>
                </div>
                <div class="hud-card-details">
                    <h3>Completion Status</h3>
                    <p id="hudProgressDetails">No tasks for today</p>
                </div>
            </div>
            <div class="hud-stats-grid">
                <div class="hud-stat-box">
                    <span class="stat-num" id="statTotal">0</span>
                    <span class="stat-label">Total Tasks</span>
                </div>
                <div class="hud-stat-box">
                    <span class="stat-num text-pending" id="statPending">0</span>
                    <span class="stat-label">Pending</span>
                </div>
                <div class="hud-stat-box">
                    <span class="stat-num text-completed" id="statCompleted">0</span>
                    <span class="stat-label">Completed</span>
                </div>
            </div>
        </section>

        <main class="app-main-content">
            <!-- Left Side: Task Form -->
            <section class="input-panel glass-panel">
                <h2 class="panel-title"><i class="fa-solid fa-plus-circle"></i> Create New Task</h2>
                <form id="todoForm" autocomplete="off">
                    <div class="form-group">
                        <label for="taskTitle">Task Title</label>
                        <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                    </div>

                    <div class="form-group">
                        <label for="taskDesc">Description (Optional)</label>
                        <textarea id="taskDesc" rows="2" placeholder="Add some details..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label for="taskCategory">Category</label>
                            <div class="custom-select-wrapper">
                                <select id="taskCategory">
                                    <option value="Work">💼 Work</option>
                                    <option value="Personal">🏠 Personal</option>
                                    <option value="Shopping">🛒 Shopping</option>
                                    <option value="Health">💪 Health</option>
                                    <option value="Finance">💳 Finance</option>
                                    <option value="Other">✨ Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group flex-1">
                            <label>Priority</label>
                            <div class="priority-selector">
                                <label class="priority-option low">
                                    <input type="radio" name="priority" value="Low">
                                    <span>Low</span>
                                </label>
                                <label class="priority-option medium">
                                    <input type="radio" name="priority" value="Medium" checked>
                                    <span>Med</span>
                                </label>
                                <label class="priority-option high">
                                    <input type="radio" name="priority" value="High">
                                    <span>High</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" id="addTaskBtn">
                        <span>Add Task</span>
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </form>
            </section>

            <!-- Right Side: Task List & Controls -->
            <section class="list-panel glass-panel">
                <div class="list-header-controls">
                    <!-- Search -->
                    <div class="search-bar-wrapper">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" id="searchInput" placeholder="Search tasks...">
                    </div>

                    <!-- Filters -->
                    <div class="filters-row">
                        <div class="filter-group">
                            <label for="filterStatus">Status</label>
                            <select id="filterStatus" class="select-sm">
                                <option value="all">All</option>
                                <option value="active">Active</option>
                                <option value="completed">Completed</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="filterCategory">Category</label>
                            <select id="filterCategory" class="select-sm">
                                <option value="all">All Categories</option>
                                <option value="Work">Work</option>
                                <option value="Personal">Personal</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Health">Health</option>
                                <option value="Finance">Finance</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="sortBy">Sort By</label>
                            <select id="sortBy" class="select-sm">
                                <option value="dateDesc">Newest First</option>
                                <option value="dateAsc">Oldest First</option>
                                <option value="priorityDesc">High Priority First</option>
                                <option value="alphabetical">A - Z</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Empty State -->
                <div class="empty-state-view" id="emptyState">
                    <div class="empty-icon"><i class="fa-solid fa-clipboard-list"></i></div>
                    <h3>No tasks found</h3>
                    <p>Try adjusting your filters, searching for something else, or creating a new task!</p>
                </div>

                <!-- Task Cards Container -->
                <div class="todo-list" id="todoList">
                    <!-- Cards will be dynamically injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal-backdrop" id="editModal">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h2>Edit Task</h2>
                <button class="close-modal-btn" id="closeModalBtn"><i class="fa-solid fa-times"></i></button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editTaskId">
                <div class="form-group">
                    <label for="editTaskTitle">Task Title</label>
                    <input type="text" id="editTaskTitle" required>
                </div>
                <div class="form-group">
                    <label for="editTaskDesc">Description</label>
                    <textarea id="editTaskDesc" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="editTaskCategory">Category</label>
                        <select id="editTaskCategory">
                            <option value="Work">💼 Work</option>
                            <option value="Personal">🏠 Personal</option>
                            <option value="Shopping">🛒 Shopping</option>
                            <option value="Health">💪 Health</option>
                            <option value="Finance">💳 Finance</option>
                            <option value="Other">✨ Other</option>
                        </select>
                    </div>
                    <div class="form-group flex-1">
                        <label>Priority</label>
                        <div class="priority-selector">
                            <label class="priority-option low">
                                <input type="radio" name="editPriority" value="Low" id="editPriorityLow">
                                <span>Low</span>
                            </label>
                            <label class="priority-option medium">
                                <input type="radio" name="editPriority" value="Medium" id="editPriorityMedium">
                                <span>Med</span>
                            </label>
                            <label class="priority-option high">
                                <input type="radio" name="editPriority" value="High" id="editPriorityHigh">
                                <span>High</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
